<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>پارک رزیدنس</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#eef2f7;
color:#222;
}

header{
background:#0b3d91;
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

header p{
font-size:18px;
}

.container{
width:95%;
max-width:950px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:15px;
color:#0b3d91;
}

.info{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.item{
background:#f7f7f7;
padding:12px;
border-radius:10px;
}

.bar{
width:100%;
height:22px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin-top:15px;
}

#barFill{
height:100%;
width:35%;
background:#1faa59;
}

#percent{
font-size:30px;
font-weight:bold;
text-align:center;
color:#1faa59;
margin-top:15px;
}

.step{
padding:14px;
border-bottom:1px solid #eee;
font-size:18px;
}

.done{
color:green;
}

.now{
color:orange;
font-weight:bold;
}

.wait{
color:#888;
}

#qr{
display:flex;
justify-content:center;
margin-top:20px;
}

@media(max-width:700px){

.info{

grid-template-columns:1fr;

}

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<header>

<h1>🏗 پارک رزیدنس</h1>

<p>نیاوران</p>

</header>

<div class="container">

<div class="card">

<h2>مشخصات پروژه</h2>

<div class="info">

<div class="item">۶ واحد مسکونی</div>

<div class="item">شروع: ۱۴۰۴</div>

<div class="item">پایان: ۱۴۰۷</div>

<div class="item">وضعیت: شروع سقف لابی</div>

</div>

</div>

<div class="card">

<h2>درصد پیشرفت</h2>

<div id="percent">35%</div>

<div class="bar">

<div id="barFill"></div>

</div>

</div>

<div class="card">

<h2>مراحل اجرا</h2>

<div class="step done">✅ تخریب</div>

<div class="step done">✅ فونداسیون</div>

<div class="step done">✅ اسکلت بتنی</div>

<div class="step now">🟠 سقف لابی</div>

<div class="step wait">⬜ سفت کاری</div>

<div class="step wait">⬜ تأسیسات مکانیکی</div>

<div class="step wait">⬜ تأسیسات برقی</div>

<div class="step wait">⬜ نازک کاری</div>

</div>
<hr style="margin:20px 0">

<h2>📷 گالری تصاویر</h2>

<div class="phase">

  <h3>تخریب</h3>

  <input type="file" onchange="uploadPhoto(this.files[0],'takhrib')">

  <div id="gallery-takhrib"></div>
</div>  

<div class="phase">
  <h3>فونداسیون</h3>
  <div id="gallery-foundation"></div>
</div>

<div class="phase">
  <h3>اسکلت</h3>
  <div id="gallery-frame"></div>
</div>

<div class="phase">
  <h3>نازک کاری</h3>
  <div id="gallery-finish"></div>
</div>
<div class="card">

<h2>QR Code</h2>

<div id="qr"></div>

</div>

</div>

<script>

new QRCode(document.getElementById("qr"),{

text:window.location.href,

width:180,

height:180

});

</script>

</body>

</html>
