<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Park Residence</title>
<style>
body{font-family:tahoma;margin:0;background:#0f172a;color:#fff}
header{text-align:center;padding:20px;background:#111827}
.card{margin:15px;padding:15px;background:#1f2937;border-radius:10px}
.step{padding:10px;border-bottom:1px solid #333}
.done{color:#22c55e}
.now{color:#f59e0b}
.wait{color:#94a3b8}
#qr{display:flex;justify-content:center;margin-top:15px}
</style>
</head>
<body>

<header>
<h2>🏗 پارک رزیدنس</h2>
<p>سیستم نمایش مراحل ساخت</p>
</header>

<div class="card">
<h3>📊 مراحل پروژه</h3>
<div class="step done">✔ طراحی</div>
<div class="step done">✔ فونداسیون</div>
<div class="step done">✔ زیرزمین</div>
<div class="step now">▶ لابی</div>
<div class="step wait">⏳ طبقات</div>
<div class="step wait">⏳ نازک‌کاری</div>
</div>

<div class="card">
<h3>📱 QR Code</h3>
<div id="qr"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qr"), {
  text: window.location.href,
  width: 200,
  height: 200
});
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Residence</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
  <h1>🏗 Park Residence</h1>
  <p>Construction Progress System</p>
</header>

<div class="container">

  <!-- Progress -->
  <div class="card">
    <h2>📊 پیشرفت پروژه</h2>
    <div id="progressText">0%</div>
    <div class="bar"><div id="barFill"></div></div>
  </div>

  <!-- Timeline -->
  <div class="card">
    <h2>🏢 مراحل ساخت</h2>
    <div id="timeline"></div>
  </div>

  <!-- QR -->
  <div class="card center">
    <h2>📱 QR ورود به سایت</h2>
    <div id="qr"></div>
  </div>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
